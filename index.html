<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Todo Ultra-Responsive</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00d2ff;
            --bg-dark: #08090a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at top right, #161b22, #08090a);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 15px; /* Mobile spacing */
        }

        .vip-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: clamp(20px, 5vw, 40px); /* Dynamic padding */
            width: 100%;
            max-width: 550px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            max-height: 90vh;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            gap: 10px;
        }

        h2 {
            font-size: clamp(20px, 4vw, 28px); /* Responsive Font */
            font-weight: 700;
            background: linear-gradient(to right, #fff, #a5a5a5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .total-badge {
            background: rgba(0,210,255,0.1);
            border: 1px solid rgba(0,210,255,0.2);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            white-space: nowrap; /* Prevent badge breaking */
        }

        /* INPUT GROUP - Fully Responsive */
        .input-group {
            display: flex;
            flex-direction: row; /* Default side-by-side */
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.05);
            padding: 6px;
            border-radius: 18px;
            border: 1px solid var(--glass-border);
        }

        input {
            flex: 1;
            padding: 12px 15px;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 15px;
            min-width: 0; /* Important for flex-shrink on mobile */
              font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .add-btn {
            background: #fff;
            color: #000;
            padding: 10px 20px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
              font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* TASK LIST */
        #taskList {
            overflow-y: auto;
            padding-right: 4px;
        }

        .task-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
        }

        .task-item span {
            font-size: 15px;
            word-break: break-word; /* Long text won't break layout */
        }

        .delete-btn {
            background: rgba(255, 69, 58, 0.1);
            color: #ff453a;
            border: 1px solid rgba(255, 69, 58, 0.2);
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .delete-btn:hover {
            background: #ff453a;
            color: #fff;
        }

        /* 🔥 MOBILE-SPECIFIC ADJUSTMENTS */
        @media (max-width: 480px) {
            body {
                align-items: flex-start; 
                padding-top: 30px;
            }

            .input-group {
                flex-direction: column; 
                background: transparent;
                border: none;
                padding: 0;
            }

            input {
                background: rgba(255,255,255,0.05);
                border: 1px solid var(--glass-border);
                border-radius: 14px;
                width: 100%;
            }

            .add-btn {
                width: 100%;
                padding: 14px;
            }

            .task-item {
                padding: 12px;
            }
        }
    </style>
</head>
<body>

<div class="vip-card">
    <div class="header">
        <h2>Items List</h2>
        <div class="total-badge" id="totalCount">0 Items</div>
    </div>

    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Add a new task...">
        <button class="add-btn" onclick="addTask()">Add Items</button>
    </div>

    <div id="taskList"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBFpO2XYMNu5Ixk2ftpWRltdr7N6clActg",
        authDomain: "create-account-fcd25.firebaseapp.com",
        projectId: "create-account-fcd25",
        storageBucket: "create-account-fcd25.firebasestorage.app",
        messagingSenderId: "850091935478",
        appId: "1:850091935478:web:a70442efdc5428d9a30ed7"
    };

    const db = getFirestore(initializeApp(firebaseConfig));
    const taskList = document.getElementById("taskList");
    const totalCount = document.getElementById("totalCount");

    onSnapshot(collection(db, "todos"), snap =>{
        totalCount.innerText = `${snap.size} Iteams`;
        taskList.innerHTML = snap.docs.map(d => `
            <div class="task-item">
                <span>${d.data().Task}</span>
                <button class="delete-btn" onclick="deleteTask('${d.id}')">Delete</button>
            </div>
        `).join('');
    });

    window.addTask = async () => {
        const input = document.getElementById("taskInput");
        const task = input.value.trim();
        if(task === "") return alert("please enter a list items");
        await addDoc(collection(db, "todos"), { Task: task });
        input.value = "";
        alert("Your List item Name Is " + task)
    };


    window.deleteTask = async (id) => {
        await deleteDoc(doc(db, "todos", id));
    };
</script>

</body>
</html>
